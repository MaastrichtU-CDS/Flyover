services:
  # The CI test stack always runs against GraphDB (profile: graphdb).
  # Activate it with: COMPOSE_PROFILES=graphdb docker compose -f docker-compose.yml -f docker-compose.test.yml ...
  rdf-store-graphdb:
    build:
      context: ./rdf-store/graphdb
    image: flyover-graphdb-test:local
    volumes: !reset []
    tmpfs:
      - /opt/graphdb/home:size=2g,mode=1777
    environment:
      - GDB_HEAP_SIZE=2g
      - GDB_MIN_MEM=1g
      - GDB_MAX_MEM=2g

  triplifier:
    build:
      context: ./triplifier
    environment:
      - FLYOVER_RDF_STORE_URL=http://rdf-store:7200
      - FLYOVER_MATERIALIZE_INFERENCES=false
