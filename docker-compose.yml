services:
  # ─── Option A: GraphDB (default) ────────────────────────────────────
  # Uncomment this block and comment out Option B to use GraphDB.
  # rdf-store:
  #   image: ghcr.io/maastrichtu-cds/flyover-graphdb:latest
  #   # If preferred, the graphdb image can be built from the Dockerfile
  #   # build:
  #   #   context: ./rdf-store/graphdb
  #   ports:
  #     - "127.0.0.1:7200:7200"
  #   volumes:
  #     - ./rdf-store/graphdb/data:/opt/graphdb/home
  #   environment:
  #     - GDB_HEAP_SIZE=8g
  #     - GDB_MIN_MEM=4g
  #     - GDB_MAX_MEM=12g
  #   networks:
  #     - proxynet
  #   container_name: rdf-store

  # ─── Option B: RDF4J ────────────────────────────────────────────────
  # The Dockerfile auto-creates the "userRepo" repository on first start.
  rdf-store:
    build:
      context: ./rdf-store/rdf4j
    ports:
      - "7200:7200"
    volumes:
      - ./rdf-store/rdf4j/data:/var/rdf4j
      - ./rdf-store/rdf4j/logs:/usr/local/tomcat/logs
    environment:
      - "JAVA_OPTS=-Xms4g -Xmx12g"
    networks:
      - proxynet
    container_name: rdf-store

  triplifier:
   # image: ghcr.io/maastrichtu-cds/flyover-triplifier:latest
    # If preferred, the triplifier image can be built from the Dockerfile
    build:
       context: ./triplifier
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      # ── GraphDB URL (use with Option A) ──
      # - FLYOVER_RDF_STORE_URL=http://rdf-store:7200
      # ── RDF4J URL (use with Option B) ──
      - FLYOVER_RDF_STORE_URL=http://rdf-store:7200/rdf4j-server
      - FLYOVER_REPOSITORY_NAME=userRepo
      - FLASK_ENV=production
      # Enable manual materialization of inferred triples in a separate graph.
      # Set to true when the RDF store does not perform reasoning (e.g. RDF4J).
      - FLYOVER_MATERIALIZE_INFERENCES=true
      # Optional: Override default timeout settings
      # - GUNICORN_TIMEOUT=300
      # - RDF_REQUEST_TIMEOUT=3600
    hostname: "data.local"
    networks:
      - proxynet
    container_name: triplifier

networks:
  proxynet:
    name: flyover_network
