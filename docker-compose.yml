services:
  rdf-store:
    image: ghcr.io/maastrichtu-cds/flyover-graphdb:latest
    # If preferred, the graphdb image can be built from the Dockerfile in the graphdb directory
    #build:
    #  context: ./graphdb
    ports:
      - "127.0.0.1:7200:7200"
    volumes:
      - ./graphdb/data:/opt/graphdb/home
    environment:
      - GDB_HEAP_SIZE=8g
      - GDB_MIN_MEM=4g
      - GDB_MAX_MEM=12g
    networks:
      - proxynet
    container_name: rdf-store

  flyover:
    #image: ghcr.io/maastrichtu-cds/flyover:latest
    # If preferred, the flyover image can be built from the Dockerfile at the repo root.
    build:
       context: .
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - FLYOVER_RDF_STORE_URL=http://rdf-store:7200
      - FLYOVER_REPOSITORY_NAME=userRepo
      - FLASK_ENV=production
      # Optional: Override default timeout settings
      # - GUNICORN_TIMEOUT=300
      # - RDF_REQUEST_TIMEOUT=3600
    hostname: "data.local"
    networks:
      - proxynet
    container_name: flyover

networks:
  proxynet:
    name: flyover_network
