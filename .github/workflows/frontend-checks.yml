name: Frontend Checks

on:
  push:
    paths:
      - 'triplifier/frontend/**'
      - '.github/workflows/frontend-checks.yml'
  pull_request:
    branches: [main]
    paths:
      - 'triplifier/frontend/**'
      - '.github/workflows/frontend-checks.yml'
  workflow_dispatch:

jobs:
  frontend-checks:
    name: Lint, type-check, unit tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: triplifier/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: triplifier/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build
