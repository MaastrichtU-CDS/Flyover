name: Frontend Smoke E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: Playwright smoke against tmpfs stack
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browser
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install chromium

      - name: Install Playwright OS deps
        working-directory: frontend
        run: npx playwright install-deps chromium

      - name: Start stack (tmpfs)
        run: ./scripts/start-test-stack.sh

      - name: Run smoke spec
        working-directory: frontend
        run: npx playwright test tests/e2e/smoke.spec.js --reporter=line

      - name: Capture docker logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml \
            logs --no-color > docker-logs.txt

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ github.run_id }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
            docker-logs.txt
          retention-days: 7
          if-no-files-found: ignore

      - name: Tear down stack
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml down -v
